version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    # image: legal-doc-es:0.0.1
    container_name: es01
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.ml.use_auto_machine_memory_percent=true
      - xpack.security.enrollment.enabled=true
      - ES_JAVA_OPTS=-Xms2048m -Xmx2048m
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elastic
    mem_limit: 8g
    # volumes:
    #   - ../es_data/data:/usr/share/elasticsearch/data
    #   - ../es_data/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    #   - ../es_data/snapshots:/usr/share/elasticsearch/snapshots
    #   - ../es_data/logs:/usr/share/elasticsearch/logs
    restart: unless-stopped

networks:
  elastic:
    driver: bridge

